  <!-- Camion -->
  <g transform="translate(18, 56)">
    <!-- Carrosserie -->
    <rect x="0" y="20" width="110" height="52" rx="6" fill="#ffffff"/>
    <!-- Cabine -->
    <rect x="110" y="8" width="48" height="64" rx="6" fill="#ffffff"/>
